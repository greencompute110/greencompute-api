services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: greenference
      POSTGRES_USER: greenference
      POSTGRES_PASSWORD: greenference
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  nats:
    image: nats:2.10
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"
  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: greenference
      MINIO_ROOT_PASSWORD: greenference
    ports:
      - "9000:9000"
      - "9001:9001"
  registry:
    image: registry:2
    ports:
      - "5000:5000"

